# [PREMIUM] Docker Compose for manufacturing compliance dashboard
# Get the full version at: https://pawankapko.gumroad.com/

version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./config.yaml:/app/config.yaml
      - compliance_data:/app/data
    restart: unless-stopped

volumes:
  compliance_data:
