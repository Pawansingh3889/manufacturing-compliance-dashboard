name: Welcome first-time contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue here! A few pointers:

            - If this is a **data-integrity or security** issue (wrong MP,
              wrong council tax, broken attribution, silent staleness),
              please close this and file a [private advisory](../../security/advisories/new)
              instead — see [`SECURITY.md`](../blob/main/SECURITY.md).
            - **Feature requests** benefit from a BRCGS clause reference
              (e.g. 3.9 Traceability, 3.11 Product Release, 8.5.1
              Electronic Records). See [`CONTRIBUTING.md`](../blob/main/CONTRIBUTING.md).
            - **Bug reports**: surface (Streamlit / API / MCP), steps to
              reproduce, deploy target (local / Streamlit Cloud / HF).
              Never paste real operational data.

            The maintainer replies within 7 calendar days (see [`GOVERNANCE.md`](../blob/main/GOVERNANCE.md)).
          pr-message: |
            Thanks for your first PR here! Before review:

            - `make test`, `make lint`, `make typecheck` all pass locally
            - The PR template's anonymisation checklist is completed
              (no real employee names, customers, batch codes, zones,
              vessels, or passwords in the diff)
            - `CHANGELOG.md` `[Unreleased]` entry if the change is
              user-facing

            First-PR-wins on the linked issue applies for 7 days.
