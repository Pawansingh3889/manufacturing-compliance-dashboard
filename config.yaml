# Manufacturing Compliance Dashboard Configuration
# Based on real UK fish processing factory operations

facility:
  name: "Fish Processing Facility"
  site_code: "FPF-001"
  standard: "BRC Food Safety"
  primary_customer: "Customer A"

# Batch code format
# D = Defrost, F = Fresh
# Numbers = Julian date (YDDD format: Y=last digit of year, DDD=day of year)
# Letter suffix = sub-batch (A, B, C, D, E, F)
# Example: X1234A = Defrost, 2026 day 067 (March 8), batch K
# Example: Y5678B = Fresh, 2026 day 043 (February 12), batch A
batch_codes:
  prefixes:
    D: "Defrost"
    F: "Fresh"
  date_format: "YDDD"  # Y = last digit of year, DDD = day of year

# Shelf life rules
# Shelf life rules — days counted from use-by date on label
# Concession required if plan use-by > tag use-by
shelf_life:
  normal:
    days: 9
    description: "Standard shelf life"
  rubber_clock:
    days: 10
    description: "+10 only if packed before 2pm (clock starts after 2pm)"
  superchilled:
    days: 11
    description: "Zone Aed storage"
  superchilled_freeze_down:
    days: 12
    description: "Zone Aed after freeze-down"

# Temperature thresholds by zone
temperature:
  locations:
    Zone A:
      min: -1.0
      max: 1.0
      category: superchill
      description: "Fresh fish storage (-1 to +1C)"
    Zone B:
      min: 0.0
      max: 5.0
      category: chilled
      description: "Defrost and general chilled storage"
    Zone C:
      min: 0.0
      max: 5.0
      category: chilled
      description: "Secondary chilled storage"
    Zone D:
      min: -22.0
      max: -18.0
      category: frozen
      description: "Frozen storage"
    Zone E:
      min: 8.0
      max: 15.0
      category: ambient
      description: "Processing area"
    Zone F:
      min: 0.0
      max: 5.0
      category: chilled
      description: "Loading and dispatch area"
  excursion_alert_minutes: 30

# Allergens tracked (EU 14 major allergens)
allergens:
  - Fish
  - Crustaceans
  - Molluscs
  - Milk
  - Eggs
  - Gluten
  - Soya
  - Sulphites
  - Mustard
  - Celery
  - Sesame
  - Lupin
  - Nuts
  - Peanuts

# Compliance scoring
scoring:
  temperature_weight: 0.4
  traceability_weight: 0.4
  shelf_life_weight: 0.2
  passing_threshold: 85

# Database
database:
  url: "sqlite:///data/factory_compliance.db"

# Demo data
demo:
  days: 60
  products: 12
  readings_per_day: 8
