# Manufacturing Compliance Dashboard Configuration
# Based on real UK fish processing factory operations

facility:
  name: "Fish Processing Facility"
  site_code: "FPF-001"
  standard: "BRC Food Safety"
  primary_customer: "Lidl"

# Batch code format
# D = Defrost, F = Fresh
# Numbers = Julian date (YDDD format: Y=last digit of year, DDD=day of year)
# Letter suffix = sub-batch (A, B, C, D, E, F)
# Example: D6067K = Defrost, 2026 day 067 (March 8), batch K
# Example: F6043A = Fresh, 2026 day 043 (February 12), batch A
batch_codes:
  prefixes:
    D: "Defrost"
    F: "Fresh"
  date_format: "YDDD"  # Y = last digit of year, DDD = day of year

# Shelf life rules
shelf_life:
  fresh:
    days: 19
    storage: "superchill"
    concession_required: false
  defrost:
    days: 11
    storage: "chiller"
    concession_required_after: 11  # Days beyond which concession is needed

# Temperature thresholds by zone
temperature:
  locations:
    Superchill:
      min: -1.0
      max: 1.0
      category: superchill
      description: "Fresh fish storage (-1 to +1C)"
    Chiller 1:
      min: 0.0
      max: 5.0
      category: chilled
      description: "Defrost and general chilled storage"
    Chiller 2:
      min: 0.0
      max: 5.0
      category: chilled
      description: "Secondary chilled storage"
    Freezer 1:
      min: -22.0
      max: -18.0
      category: frozen
      description: "Frozen storage"
    Production Floor:
      min: 8.0
      max: 15.0
      category: ambient
      description: "Processing area"
    Dispatch Bay:
      min: 0.0
      max: 5.0
      category: chilled
      description: "Loading and dispatch area"
  excursion_alert_minutes: 30

# Allergens tracked (EU 14 major allergens)
allergens:
  - Fish
  - Crustaceans
  - Molluscs
  - Milk
  - Eggs
  - Gluten
  - Soya
  - Sulphites
  - Mustard
  - Celery
  - Sesame
  - Lupin
  - Nuts
  - Peanuts

# Compliance scoring
scoring:
  temperature_weight: 0.4
  traceability_weight: 0.4
  shelf_life_weight: 0.2
  passing_threshold: 85

# Database
database:
  url: "sqlite:///data/compliance.db"

# Demo data
demo:
  days: 60
  products: 12
  readings_per_day: 8
